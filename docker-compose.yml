version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: onegcc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onegcc_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ai-service:
    build: .
    container_name: onegcc-ai-service
    depends_on:
      - postgres
    ports:
      - "8001:8000"
    env_file:
      - .env

volumes:
  postgres_data: